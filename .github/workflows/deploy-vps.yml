name: Deploy to VPS (play.lemnity.ru)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build

      - name: Copy files to VPS via rsync over SSH
        uses: burnett01/rsync-deployments@v7.1.4
        with:
          switches: -avz --delete
          path: ./
          remote_path: /opt/rps-vk-game
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Restart app on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rps-vk-game
            npm install --production=false
            pm2 restart rps-vk-game || pm2 start npm --name rps-vk-game -- start
            pm2 save

